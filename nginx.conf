# 配置一个 HTTP 服务器
server {
    # 监听 80 端口
    listen 80;

    charset utf-8;

    # 服务器域名（可以替换成你的真实域名）
    server_name localhost;

    # 静态文件根目录
    root /usr/share/nginx/html;

    # 默认首页文件
    index index.html;

    # Gzip 压缩（减小网络传输体积）
    gzip on;
    # 压缩级别 1-9，6 是平衡压缩率和速度的选择
    gzip_comp_level 6;
    # 压缩哪些类型的文件
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml image/svg+xml;

    # 添加 API 反向代理（关键！）
    location /api/ {
        proxy_pass http://hbs:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 处理前端路由（React Router 等）
    # try_files 按顺序尝试：
    # 1. $uri - 请求的路径是否存在文件
    # 2. $uri/ - 请求的路径是否存在目录
    # 3. /index.html - 都不存在则返回 index.html（让前端路由处理）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（图片、CSS、JS 等，除了 HTML）
    # ~* 表示不区分大小写的正则匹配
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # expires 1y 表示让浏览器缓存这些文件 1 年
        expires 1y;
        # 添加缓存控制头
        add_header Cache-Control "public, immutable";

        # 不走 try_files，直接找文件
        try_files $uri =404;
    }

    # 禁用隐藏文件访问（如 .git、.env）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
